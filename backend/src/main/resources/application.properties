spring.application.name=academic-platform

server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/pfe_academic_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

app.jwt.secret=${APP_JWT_SECRET:dev-only-jwt-secret-change-this-value-before-production-2026}
app.jwt.expiration-ms=86400000
app.auth.max-login-attempts=5
app.auth.lock-duration-minutes=1
app.auth.password-reset-code-ttl-minutes=10
app.auth.two-factor-challenge-ttl-minutes=5
app.auth.two-factor-enrollment-ttl-minutes=10
app.auth.trusted-device-ttl-days=30
app.auth.two-factor-issuer=ESPRIT Academic Platform
app.auth.two-factor-backup-code-count=8
app.auth.password-reset-sender=${APP_MAIL_FROM:no-reply@esprit.tn}
app.auth.password-reset-subject=${APP_PASSWORD_RESET_SUBJECT:Code de verification de votre compte ESPRIT}
app.auth.log-password-reset-code=${APP_LOG_PASSWORD_RESET_CODE:false}
app.auth.face-recognition-match-threshold=${APP_FACE_RECOGNITION_MATCH_THRESHOLD:0.48}
app.passkey.rp-id=${APP_PASSKEY_RP_ID:localhost}
app.passkey.origin=${APP_PASSKEY_ORIGIN:http://localhost:4200}
app.passkey.rp-name=${APP_PASSKEY_RP_NAME:ESPRIT Academic Platform}
app.passkey.challenge-ttl-minutes=${APP_PASSKEY_CHALLENGE_TTL_MINUTES:5}
app.passkey.timeout-ms=${APP_PASSKEY_TIMEOUT_MS:60000}
app.bootstrap.sample-passwords=false
app.bootstrap.default-password=${APP_BOOTSTRAP_DEFAULT_PASSWORD:}
app.availability.medical-certificates-dir=uploaded-medical-certificates
app.workflow.mail.sender=${APP_WORKFLOW_MAIL_SENDER:${APP_MAIL_FROM:no-reply@esprit.tn}}
app.workflow.mail.rh-recipient=${APP_WORKFLOW_MAIL_RH_RECIPIENT:}
app.workflow.mail.scolarite-recipient=${APP_WORKFLOW_MAIL_SCOLARITE_RECIPIENT:}
app.reports.output-dir=generated-reports
app.ai.assistant.weights.teaching=${APP_AI_WEIGHT_TEACHING:30}
app.ai.assistant.weights.research=${APP_AI_WEIGHT_RESEARCH:40}
app.ai.assistant.weights.supervision=${APP_AI_WEIGHT_SUPERVISION:30}
app.ai.assistant.targets.teaching-points=${APP_AI_TARGET_TEACHING_POINTS:120}
app.ai.assistant.targets.research-activities=${APP_AI_TARGET_RESEARCH_ACTIVITIES:6}
app.ai.assistant.targets.supervision-activities=${APP_AI_TARGET_SUPERVISION_ACTIVITIES:8}
app.ai.assistant.thresholds.weekly-teaching-hours-alert=${APP_AI_WEEKLY_TEACHING_ALERT:120}
app.ai.assistant.thresholds.single-teaching-hours-alert=${APP_AI_SINGLE_TEACHING_ALERT:60}
app.ai.assistant.thresholds.severe-overload-multiplier=${APP_AI_SEVERE_OVERLOAD_MULTIPLIER:1.6}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_WRITE_TIMEOUT:5000}
spring.mail.properties.mail.debug=${SPRING_MAIL_DEBUG:false}
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER}
