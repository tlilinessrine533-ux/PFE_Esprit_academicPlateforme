<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PerfIA Assistant</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');

      :root {
        --accent: #4f6ef7;
        --accent2: #7c3aed;
        --accent3: #06b6d4;
        --surface: rgba(15, 18, 32, 0.97);
        --surface2: rgba(22, 28, 48, 0.95);
        --surface3: rgba(30, 38, 65, 0.9);
        --text1: #f0f4ff;
        --text2: #a8b4d4;
        --text3: #5a6a99;
        --border: rgba(79, 110, 247, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 0.85rem;
        background: transparent;
        font-family: 'Outfit', sans-serif;
        color: var(--text1);
      }

      .perfia-shell {
        position: relative;
        width: min(100%, 780px);
        border-radius: 24px;
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow:
          0 32px 80px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(79, 110, 247, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        transform: perspective(1200px) rotateX(1.5deg);
        transform-style: preserve-3d;
        transition: transform 0.3s ease;
        overflow: hidden;
        isolation: isolate;
      }

      .perfia-shell:hover {
        transform: perspective(1200px) rotateX(0deg);
      }

      .perfia-shell::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(79, 110, 247, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(79, 110, 247, 0.08) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.4;
        pointer-events: none;
        z-index: 0;
      }

      .orb {
        position: absolute;
        border-radius: 999px;
        filter: blur(26px);
        pointer-events: none;
        z-index: 0;
      }

      .orb-blue {
        top: -92px;
        right: -92px;
        width: 250px;
        height: 250px;
        background: radial-gradient(circle, rgba(6, 182, 212, 0.52), transparent 64%);
        animation: pulse1 6s ease-in-out infinite;
      }

      .orb-violet {
        left: -98px;
        bottom: -110px;
        width: 280px;
        height: 280px;
        background: radial-gradient(circle, rgba(124, 58, 237, 0.45), transparent 68%);
        animation: pulse2 8s ease-in-out infinite;
      }

      .topbar,
      .rolebar,
      .messages-wrap,
      .quickbar,
      .inputbar,
      .footer {
        position: relative;
        z-index: 2;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 0.9rem;
        padding: 0.86rem 1rem;
        background: rgba(22, 28, 48, 0.95);
        border-bottom: 1px solid rgba(79, 110, 247, 0.16);
      }

      .topbar-left {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 0.8rem;
      }

      .ai-avatar {
        position: relative;
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        color: #fff;
        background: linear-gradient(140deg, var(--accent), var(--accent2));
        box-shadow:
          0 0 18px rgba(79, 110, 247, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
        animation: avatarGlow 3s ease-in-out infinite;
        flex: none;
      }

      .ai-avatar::before {
        content: '';
        position: absolute;
        inset: -3px;
        border-radius: 14px;
        background: linear-gradient(120deg, #80afff, #a564ff, #29d3ff);
        opacity: 0.8;
        z-index: -1;
        filter: blur(0.5px);
        animation: ringRotate 4s linear infinite;
      }

      .ai-avatar svg {
        width: 22px;
        height: 22px;
      }

      .identity {
        min-width: 0;
        display: grid;
        gap: 0.16rem;
      }

      .identity-top {
        display: flex;
        align-items: center;
        gap: 0.45rem;
      }

      .identity-top strong {
        font-size: 1.05rem;
        white-space: nowrap;
      }

      .badge-ai {
        padding: 0.15rem 0.54rem;
        border-radius: 999px;
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
      }

      .status-line {
        font-size: 0.8rem;
        color: var(--text2);
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .status-dot {
        width: 0.55rem;
        height: 0.55rem;
        border-radius: 999px;
        background: #2fd684;
        box-shadow: 0 0 9px rgba(47, 214, 132, 0.82);
        animation: blink 2s ease-in-out infinite;
        flex: none;
      }

      .topbar-actions {
        display: flex;
        gap: 0.48rem;
      }

      .icon-btn {
        width: 36px;
        height: 36px;
        border-radius: 11px;
        border: 1px solid rgba(154, 178, 239, 0.28);
        background: rgba(255, 255, 255, 0.02);
        color: var(--text2);
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: all 0.18s ease;
      }

      .icon-btn:hover {
        border-color: rgba(122, 176, 255, 0.8);
        color: #d2e7ff;
        box-shadow: 0 0 14px rgba(79, 110, 247, 0.32);
        transform: translateY(-1px);
      }

      .icon-btn svg {
        width: 17px;
        height: 17px;
      }

      .rolebar {
        padding: 0.68rem 0.8rem;
        border-bottom: 1px solid rgba(79, 110, 247, 0.15);
        background: rgba(22, 28, 48, 0.66);
      }

      .rolechips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .role-chip {
        border-radius: 999px;
        border: 1px solid rgba(114, 133, 190, 0.32);
        background: transparent;
        color: var(--text2);
        padding: 0.45rem 0.9rem;
        font-family: inherit;
        font-weight: 700;
        letter-spacing: 0.03em;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .role-chip.active {
        color: #fff;
        background: linear-gradient(130deg, rgba(79, 110, 247, 0.9), rgba(124, 58, 237, 0.85));
        border-color: rgba(122, 176, 255, 0.86);
        box-shadow: 0 0 18px rgba(79, 110, 247, 0.35);
      }

      .messages-wrap {
        height: 380px;
        overflow: auto;
        padding: 0.95rem 0.82rem;
      }

      .messages-wrap::-webkit-scrollbar {
        width: 0.45rem;
      }

      .messages-wrap::-webkit-scrollbar-thumb {
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(79, 110, 247, 0.88), rgba(124, 58, 237, 0.76));
      }

      .message-row {
        display: flex;
        gap: 0.55rem;
        margin-bottom: 0.68rem;
        animation: msgIn 0.35s cubic-bezier(0.23, 1, 0.32, 1);
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .msg-avatar {
        width: 30px;
        height: 30px;
        border-radius: 9px;
        flex: none;
        font-size: 0.76rem;
        font-weight: 800;
        display: grid;
        place-items: center;
      }

      .msg-avatar.ai {
        color: #fff;
        background: linear-gradient(140deg, var(--accent), var(--accent2));
        box-shadow: 0 0 14px rgba(79, 110, 247, 0.4);
      }

      .msg-avatar.user {
        color: #d8e0ff;
        background: rgba(22, 28, 48, 0.95);
        border: 1px solid rgba(154, 178, 239, 0.22);
      }

      .msg-bubble {
        max-width: min(86%, 640px);
        border: 1px solid rgba(129, 154, 225, 0.24);
        padding: 0.66rem 0.78rem;
      }

      .message-row.ai .msg-bubble {
        background: rgba(30, 38, 65, 0.9);
        border-radius: 4px 16px 16px 16px;
      }

      .message-row.user .msg-bubble {
        color: #eef2ff;
        background: linear-gradient(135deg, #4f6ef7, #5b50f0);
        border-color: rgba(156, 180, 255, 0.34);
        border-radius: 16px 4px 16px 16px;
        box-shadow: 0 4px 20px rgba(79, 110, 247, 0.35);
      }

      .msg-bubble p {
        margin: 0.1rem 0 0;
        color: var(--text1);
        line-height: 1.5;
      }

      .section-block + .section-block {
        margin-top: 0.52rem;
      }

      .section-tag {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 0.15rem 0.52rem;
        font-size: 0.69rem;
        letter-spacing: 0.05em;
        font-weight: 700;
        text-transform: uppercase;
      }

      .tag-summary {
        color: #34d399;
        background: rgba(52, 211, 153, 0.13);
      }

      .tag-analysis {
        color: #818cf8;
        background: rgba(129, 140, 248, 0.14);
      }

      .tag-reco {
        color: #fcd34d;
        background: rgba(252, 211, 77, 0.14);
      }

      .section-text {
        margin-top: 0.34rem;
        font-size: 0.92rem;
      }

      .section-text ul {
        margin: 0;
        padding-left: 1rem;
        display: grid;
        gap: 0.16rem;
      }

      .stats-grid {
        margin-top: 0.62rem;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.35rem;
      }

      .stat-card {
        border-radius: 10px;
        border: 1px solid rgba(129, 154, 225, 0.18);
        background: rgba(15, 18, 32, 0.8);
        padding: 0.42rem 0.5rem;
      }

      .stat-label {
        font-family: 'JetBrains Mono', monospace;
        text-transform: uppercase;
        font-size: 0.58rem;
        color: var(--text3);
      }

      .stat-value {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        font-weight: 800;
        margin-top: 0.18rem;
      }

      .stat-trend {
        margin-top: 0.08rem;
        font-size: 0.69rem;
        font-family: 'JetBrains Mono', monospace;
      }

      .trend-up {
        color: #34d399;
      }

      .trend-down {
        color: #f87171;
      }

      .progress-pack {
        margin-top: 0.56rem;
        display: grid;
        gap: 0.3rem;
      }

      .progress-line {
        display: grid;
        grid-template-columns: 7rem 1fr auto;
        align-items: center;
        gap: 0.45rem;
      }

      .progress-line label,
      .progress-line span {
        font-size: 0.66rem;
        color: var(--text2);
        font-family: 'JetBrains Mono', monospace;
      }

      .track {
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }

      .fill {
        height: 100%;
        border-radius: inherit;
        box-shadow: 0 0 12px currentColor;
      }

      .fill-ens {
        color: #6fa3ff;
        background: linear-gradient(90deg, #4f6ef7, #7c3aed);
      }

      .fill-rech {
        color: #67d9ff;
        background: linear-gradient(90deg, #7c3aed, #06b6d4);
      }

      .fill-enc {
        color: #ffb95a;
        background: linear-gradient(90deg, #f59e0b, #fb7185);
      }

      .divider {
        margin: 0.7rem 0 0.15rem;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 0.5rem;
        color: var(--text3);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.74rem;
      }

      .divider::before,
      .divider::after {
        content: '';
        height: 1px;
        background: rgba(112, 131, 191, 0.3);
      }

      .typing-wrap {
        display: inline-flex;
        align-items: center;
        gap: 0.24rem;
      }

      .typing-dot {
        width: 0.4rem;
        height: 0.4rem;
        border-radius: 999px;
        animation: typingBounce 0.9s ease-in-out infinite;
      }

      .typing-dot:nth-child(1) {
        background: #4f6ef7;
        animation-delay: 0s;
      }

      .typing-dot:nth-child(2) {
        background: #6366f1;
        animation-delay: 0.2s;
      }

      .typing-dot:nth-child(3) {
        background: #7c3aed;
        animation-delay: 0.4s;
      }

      .quickbar {
        padding: 0.55rem 0.76rem 0.72rem;
        display: flex;
        gap: 0.45rem;
        flex-wrap: wrap;
      }

      .quick-chip {
        border-radius: 999px;
        border: 1px solid rgba(117, 143, 214, 0.34);
        padding: 0.42rem 0.78rem;
        color: var(--text2);
        background: rgba(255, 255, 255, 0.02);
        font-family: inherit;
        cursor: pointer;
        transition: all 0.18s ease;
      }

      .quick-chip:hover {
        transform: translateY(-1px);
        border-color: rgba(122, 176, 255, 0.85);
        background: rgba(79, 110, 247, 0.14);
        color: #deebff;
      }

      .inputbar {
        padding: 0.72rem 0.82rem 0.78rem;
        background: rgba(22, 28, 48, 0.95);
        border-top: 1px solid rgba(79, 110, 247, 0.16);
      }

      .input-wrap {
        border-radius: 16px;
        border: 1px solid rgba(122, 146, 207, 0.34);
        background: rgba(15, 18, 32, 0.58);
        padding: 0.44rem;
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 0.35rem;
        align-items: end;
      }

      .composer {
        width: 100%;
        min-height: 40px;
        max-height: 130px;
        resize: none;
        border: 0;
        outline: none;
        border-radius: 12px;
        background: transparent;
        color: var(--text1);
        font: inherit;
        font-size: 0.98rem;
        line-height: 1.4;
        padding: 0.48rem 0.58rem;
      }

      .composer::placeholder {
        color: #7f8cb0;
      }

      .input-wrap:focus-within {
        border-color: rgba(109, 160, 255, 0.92);
        box-shadow:
          0 0 0 1px rgba(109, 160, 255, 0.24),
          0 0 20px rgba(79, 110, 247, 0.32);
      }

      .attach-btn,
      .send-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: 1px solid rgba(122, 146, 207, 0.36);
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .attach-btn {
        background: rgba(255, 255, 255, 0.03);
        color: var(--text2);
      }

      .send-btn {
        border-color: rgba(156, 185, 255, 0.55);
        color: #fff;
        background: linear-gradient(140deg, var(--accent), var(--accent2));
        box-shadow: 0 0 18px rgba(79, 110, 247, 0.45);
        transition: transform 0.18s ease;
      }

      .send-btn:hover:not(:disabled) {
        transform: scale(1.06);
      }

      .send-btn:disabled {
        opacity: 0.58;
        cursor: not-allowed;
      }

      .footer {
        border-top: 1px solid rgba(79, 110, 247, 0.18);
        background: rgba(11, 15, 29, 0.9);
        padding: 0.5rem 0.82rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.7rem;
        color: var(--text3);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.73rem;
      }

      .footer-right {
        display: inline-flex;
        align-items: center;
        gap: 0.34rem;
      }

      .small-green {
        width: 0.45rem;
        height: 0.45rem;
        border-radius: 999px;
        background: #2fd684;
        animation: blink 2s ease-in-out infinite;
      }

      @media (max-width: 780px) {
        body {
          padding: 0.35rem;
        }

        .topbar {
          padding: 0.68rem;
        }

        .identity-top strong {
          font-size: 0.95rem;
        }

        .status-line {
          font-size: 0.74rem;
        }

        .messages-wrap {
          height: 350px;
          padding: 0.68rem;
        }

        .msg-bubble {
          max-width: 92%;
        }

        .stats-grid {
          grid-template-columns: 1fr;
        }

        .progress-line {
          grid-template-columns: 1fr;
          gap: 0.2rem;
        }

        .input-wrap {
          grid-template-columns: 1fr;
        }

        .attach-btn,
        .send-btn {
          width: 100%;
        }

        .footer {
          flex-direction: column;
          align-items: flex-start;
        }
      }

      @keyframes avatarGlow {
        0%,
        100% {
          box-shadow:
            0 0 12px rgba(79, 110, 247, 0.35),
            inset 0 1px 0 rgba(255, 255, 255, 0.22);
        }

        50% {
          box-shadow:
            0 0 24px rgba(79, 110, 247, 0.75),
            0 0 18px rgba(124, 58, 237, 0.45),
            inset 0 1px 0 rgba(255, 255, 255, 0.28);
        }
      }

      @keyframes ringRotate {
        0% {
          filter: hue-rotate(0deg);
        }

        100% {
          filter: hue-rotate(360deg);
        }
      }

      @keyframes pulse1 {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.78;
        }

        50% {
          transform: scale(1.16);
          opacity: 0.45;
        }
      }

      @keyframes pulse2 {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.82;
        }

        50% {
          transform: scale(1.2);
          opacity: 0.36;
        }
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.3;
        }
      }

      @keyframes msgIn {
        from {
          transform: translateY(7px) scale(0.985);
          opacity: 0;
        }

        to {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }

      @keyframes typingBounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.6;
        }

        40% {
          transform: translateY(-4px);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <section class="perfia-shell">
      <div class="orb orb-blue"></div>
      <div class="orb orb-violet"></div>

      <header class="topbar">
        <div class="topbar-left">
          <div class="ai-avatar" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M12 2.2l1.8 4.7 4.8 1.8-4.8 1.8L12 15.2l-1.8-4.7-4.8-1.8 4.8-1.8L12 2.2zM18.3 14.9l.8 2.1 2.1.8-2.1.8-.8 2.1-.8-2.1-2.1-.8 2.1-.8.8-2.1zM6.1 14.3l.6 1.6 1.6.6-1.6.6-.6 1.6-.6-1.6-1.6-.6 1.6-.6.6-1.6z"
                fill="#fff"
              />
            </svg>
          </div>
          <div class="identity">
            <div class="identity-top">
              <strong>PerfIA Assistant</strong>
              <span class="badge-ai">AI</span>
            </div>
            <span class="status-line"><span class="status-dot"></span>Actif · Analyse en temps réel</span>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" id="btn-history" title="Historique" aria-label="Historique">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 5v7l4.2 2.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <path d="M4 12a8 8 0 108-8 7.9 7.9 0 00-5.8 2.5M4 4v4h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
          </button>
          <button class="icon-btn" id="btn-export" title="Exporter" aria-label="Exporter">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 4v10m0 0l-3.2-3.2M12 14l3.2-3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <path d="M5 16.7V20h14v-3.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
          </button>
          <button class="icon-btn" id="btn-settings" title="Paramètres" aria-label="Paramètres">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 8.8a3.2 3.2 0 100 6.4 3.2 3.2 0 000-6.4z" stroke="currentColor" stroke-width="1.8" />
              <path
                d="M19.4 10.6l1.1 1.4-1.2 2-1.8.1a6 6 0 01-.6 1.4l1.1 1.4-1.8 1.8-1.4-1.1a6 6 0 01-1.4.6l-.1 1.8h-2l-.1-1.8a6 6 0 01-1.4-.6l-1.4 1.1-1.8-1.8 1.1-1.4a6 6 0 01-.6-1.4L3.5 14 2.3 12l1.1-1.4 1.8-.1a6 6 0 01.6-1.4L4.7 7.7l1.8-1.8 1.4 1.1a6 6 0 011.4-.6l.1-1.8h2l.1 1.8a6 6 0 011.4.6l1.4-1.1 1.8 1.8-1.1 1.4c.3.4.5.9.6 1.4l1.8.1z"
                stroke="currentColor"
                stroke-width="1.2"
              />
            </svg>
          </button>
        </div>
      </header>

      <div class="rolebar">
        <div class="rolechips" id="rolechips">
          <button class="role-chip active" data-role="ENSEIGNANT">👨‍🏫 ENSEIGNANT</button>
          <button class="role-chip" data-role="CHEF_DEPARTEMENT">🧑‍💼 CHEF DÉP.</button>
          <button class="role-chip" data-role="ADMINISTRATION">🛡️ ADMIN</button>
          <button class="role-chip" data-role="SUPER_ADMIN">👑 SUPER ADMIN</button>
        </div>
      </div>

      <div class="messages-wrap" id="messages"></div>

      <div class="quickbar" id="quickchips"></div>

      <div class="inputbar">
        <div class="input-wrap">
          <textarea id="composer" class="composer" rows="1" placeholder="Posez votre question à PerfIA..."></textarea>
          <button class="attach-btn" id="btn-attach" title="Joindre" aria-label="Joindre">
            <svg viewBox="0 0 24 24" fill="none" width="17" height="17">
              <path d="M8.5 12.5l6.3-6.3a3 3 0 114.2 4.2l-8.1 8.1a5 5 0 01-7.1-7.1l8-8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
          </button>
          <button class="send-btn" id="btn-send" title="Envoyer" aria-label="Envoyer">
            <svg viewBox="0 0 24 24" fill="none" width="17" height="17">
              <path d="M4 12l15-7-3.8 14-4.1-5.4L4 12z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </div>

      <footer class="footer">
        <span>Données protégées · Faculté</span>
        <span class="footer-right"><span class="small-green"></span>claude-sonnet-4 · PerfIA v2.0</span>
      </footer>
    </section>

    <script>
      (function () {
        const API_URL = 'https://api.anthropic.com/v1/messages';
        const MODEL = 'claude-sonnet-4-20250514';
        const MAX_TOKENS = 1000;
        const SYSTEM_PROMPT =
          "Tu es PerfIA, un assistant IA spécialisé dans l'analyse des performances académiques. Tu analyses les activités académiques, expliques les scores, proposes des recommandations personnalisées, détectes des anomalies. Réponds toujours en français, de façon structurée avec des sections claires (Résumé, Analyse, Recommandations). Sois précis, professionnel et orienté action.";

        const quickPromptsByRole = {
          ENSEIGNANT: ['⚡ Détail du score', '🧙 Simulation what-if', "📋 Plan d'action", '⚠️ Anomalies'],
          CHEF_DEPARTEMENT: ['📊 Comparer équipe', '🧪 Simuler charge', '🗂️ Répartition actions', '⚠️ Risques'],
          ADMINISTRATION: ['🛡️ Vérifier anomalies', '✅ Aide validation', '📁 Export workflow', '⚠️ Cas suspects'],
          SUPER_ADMIN: ['🌍 État global', '🔮 Projection 20%', '📌 Priorités stratégiques', '⚠️ Alertes critiques']
        };

        let selectedRole = 'ENSEIGNANT';
        let typing = false;
        const messages = restoreMessages() || [
          {
            role: 'assistant',
            content:
              "Résumé: Assistant PerfIA initialisé.\nAnalyse: Je suis prêt à analyser vos performances académiques en temps réel.\nRecommandations: Posez une question précise pour obtenir une réponse actionnable."
          }
        ];

        const rolechips = document.getElementById('rolechips');
        const messagesBox = document.getElementById('messages');
        const quickchips = document.getElementById('quickchips');
        const composer = document.getElementById('composer');
        const sendBtn = document.getElementById('btn-send');
        const historyBtn = document.getElementById('btn-history');
        const exportBtn = document.getElementById('btn-export');
        const settingsBtn = document.getElementById('btn-settings');
        const attachBtn = document.getElementById('btn-attach');

        rolechips.addEventListener('click', (event) => {
          const chip = event.target.closest('.role-chip');
          if (!chip) {
            return;
          }
          selectedRole = chip.dataset.role;
          document.querySelectorAll('.role-chip').forEach((node) => node.classList.remove('active'));
          chip.classList.add('active');
          renderQuickChips();
        });

        composer.addEventListener('input', autoResizeComposer);
        composer.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendCurrentPrompt();
          }
        });

        sendBtn.addEventListener('click', sendCurrentPrompt);
        attachBtn.addEventListener('click', () => {
          toast("Aucun fichier joint pour l'instant.");
        });

        historyBtn.addEventListener('click', () => {
          messagesBox.scrollTop = 0;
          toast('Historique affiché.');
        });

        exportBtn.addEventListener('click', exportConversation);
        settingsBtn.addEventListener('click', configureAnthropicKey);

        renderQuickChips();
        renderMessages();
        autoResizeComposer();

        function renderQuickChips() {
          const chips = quickPromptsByRole[selectedRole] || quickPromptsByRole.ENSEIGNANT;
          quickchips.innerHTML = chips
            .map(
              (chip) =>
                '<button class="quick-chip" type="button" data-prompt="' +
                escapeAttribute(chip) +
                '">' +
                escapeHtml(chip) +
                '</button>'
            )
            .join('');
        }

        quickchips.addEventListener('click', (event) => {
          const chip = event.target.closest('.quick-chip');
          if (!chip) {
            return;
          }
          composer.value = chip.dataset.prompt || '';
          autoResizeComposer();
          sendCurrentPrompt();
        });

        async function sendCurrentPrompt() {
          if (typing) {
            return;
          }
          const text = composer.value.trim();
          if (!text) {
            return;
          }

          pushMessage('user', text);
          composer.value = '';
          autoResizeComposer();
          typing = true;
          renderMessages();

          try {
            const answer = await queryAnthropic();
            pushMessage('assistant', answer || "Je n'ai pas reçu de contenu exploitable.");
          } catch (error) {
            pushMessage(
              'assistant',
              "Résumé: Appel API indisponible.\nAnalyse: " +
                (error && error.message ? error.message : 'Erreur inconnue.') +
                "\nRecommandations: Configurez votre clé API via l'icône paramètres, puis réessayez."
            );
          } finally {
            typing = false;
            renderMessages();
          }
        }

        async function queryAnthropic() {
          const apiKey = getAnthropicKey();
          if (!apiKey) {
            throw new Error("Clé API Anthropic absente. Cliquez sur l'icône paramètres.");
          }

          const payload = {
            model: MODEL,
            max_tokens: MAX_TOKENS,
            system: SYSTEM_PROMPT,
            messages: messages.map((message) => ({
              role: message.role === 'assistant' ? 'assistant' : 'user',
              content: message.content
            }))
          };

          const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
              'content-type': 'application/json',
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01'
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const raw = await response.text();
            throw new Error('Anthropic API error ' + response.status + ': ' + raw.slice(0, 220));
          }

          const data = await response.json();
          const textContent = Array.isArray(data.content)
            ? data.content
                .filter((part) => part && part.type === 'text')
                .map((part) => part.text)
                .join('\n')
            : '';
          return textContent.trim();
        }

        function pushMessage(role, content) {
          messages.push({ role, content });
          persistMessages();
          renderMessages();
        }

        function renderMessages() {
          const buffer = [];
          for (const message of messages) {
            if (message.role === 'user') {
              buffer.push(renderUserMessage(message.content));
            } else {
              buffer.push(renderAssistantMessage(message.content));
            }
          }

          if (typing) {
            buffer.push(renderTypingMessage());
          }

          messagesBox.innerHTML = buffer.join('');
          messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        function renderUserMessage(content) {
          const initials = roleInitials(selectedRole);
          return (
            '<article class="message-row user">' +
            '<div class="msg-bubble"><p>' +
            formatInline(content) +
            '</p></div>' +
            '<div class="msg-avatar user">' +
            initials +
            '</div>' +
            '</article>'
          );
        }

        function renderAssistantMessage(content) {
          const sections = parseSections(content);
          const stats = buildStats(content, selectedRole);
          const progress = buildProgress(stats);

          const sectionsHtml = sections
            .map((section) => {
              const tagClass = section.kind === 'summary' ? 'tag-summary' : section.kind === 'analysis' ? 'tag-analysis' : 'tag-reco';
              return (
                '<div class="section-block">' +
                '<span class="section-tag ' +
                tagClass +
                '">' +
                section.label +
                '</span>' +
                '<div class="section-text">' +
                renderSectionText(section.lines) +
                '</div>' +
                '</div>'
              );
            })
            .join('');

          const statHtml = stats
            .map(
              (item) =>
                '<div class="stat-card">' +
                '<div class="stat-label">' +
                escapeHtml(item.label) +
                '</div>' +
                '<div class="stat-value">' +
                escapeHtml(item.value) +
                '</div>' +
                '<div class="stat-trend ' +
                (item.trend >= 0 ? 'trend-up' : 'trend-down') +
                '">' +
                (item.trend >= 0 ? '▲' : '▼') +
                ' ' +
                escapeHtml(Math.abs(item.trend).toFixed(1) + '%') +
                '</div>' +
                '</div>'
            )
            .join('');

          const progressHtml = progress
            .map(
              (line, index) =>
                '<div class="progress-line">' +
                '<label>' +
                escapeHtml(line.label) +
                '</label>' +
                '<div class="track"><div class="fill ' +
                (index === 0 ? 'fill-ens' : index === 1 ? 'fill-rech' : 'fill-enc') +
                '" style="width:' +
                line.value +
                '%"></div></div>' +
                '<span>' +
                escapeHtml(line.value.toFixed(0) + '%') +
                '</span>' +
                '</div>'
            )
            .join('');

          return (
            '<article class="message-row ai">' +
            '<div class="msg-avatar ai">✦</div>' +
            '<div class="msg-bubble">' +
            sectionsHtml +
            '<div class="stats-grid">' +
            statHtml +
            '</div>' +
            '<div class="progress-pack">' +
            progressHtml +
            '</div>' +
            '<div class="divider">Session · Analyse de performance</div>' +
            '</div>' +
            '</article>'
          );
        }

        function renderTypingMessage() {
          return (
            '<article class="message-row ai">' +
            '<div class="msg-avatar ai">✦</div>' +
            '<div class="msg-bubble"><span class="typing-wrap">' +
            '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>' +
            '</span></div>' +
            '</article>'
          );
        }

        function parseSections(rawText) {
          const lines = rawText
            .split(/\n+/)
            .map((line) => line.trim())
            .filter(Boolean);

          const output = [];
          let current = { kind: 'analysis', label: 'Analyse', lines: [] };

          function flush() {
            if (current.lines.length) {
              output.push({ kind: current.kind, label: current.label, lines: current.lines.slice() });
            }
          }

          for (const line of lines) {
            const detected = detectSection(line);
            if (detected) {
              flush();
              const stripped = line.replace(/^(\d+\.)?\s*(résumé|resume|analyse|recommandations?|recommendations?)\s*:?/i, '').trim();
              current = { kind: detected.kind, label: detected.label, lines: stripped ? [stripped] : [] };
            } else {
              current.lines.push(line);
            }
          }

          flush();

          if (!output.length) {
            return [{ kind: 'analysis', label: 'Analyse', lines: lines.length ? lines : ['Aucun contenu disponible.'] }];
          }

          return output;
        }

        function detectSection(line) {
          const normalized = stripAccents(line.toLowerCase());
          if (/^(1\.)?\s*resume\b/.test(normalized)) {
            return { kind: 'summary', label: 'Résumé' };
          }
          if (/^(2\.)?\s*analyse\b/.test(normalized)) {
            return { kind: 'analysis', label: 'Analyse' };
          }
          if (/^(3\.)?\s*recommand/.test(normalized)) {
            return { kind: 'reco', label: 'Recommandation' };
          }
          if (/^(3\.)?\s*recommend/.test(normalized)) {
            return { kind: 'reco', label: 'Recommandation' };
          }
          return null;
        }

        function renderSectionText(lines) {
          if (!lines.length) {
            return '';
          }

          const allBullets = lines.every((line) => /^[-•]/.test(line));
          if (allBullets) {
            return (
              '<ul>' +
              lines
                .map((line) => line.replace(/^[-•]\s*/, ''))
                .map((line) => '<li>' + formatInline(line) + '</li>')
                .join('') +
              '</ul>'
            );
          }

          return (
            '<p>' +
            lines
              .map((line) => formatInline(line))
              .join('<br />') +
            '</p>'
          );
        }

        function buildStats(text, role) {
          const defaultsByRole = {
            ENSEIGNANT: [74, 49, 68],
            CHEF_DEPARTEMENT: [71, 56, 63],
            ADMINISTRATION: [79, 61, 72],
            SUPER_ADMIN: [76, 58, 66]
          };
          const defaults = defaultsByRole[role] || defaultsByRole.ENSEIGNANT;
          const values = defaults.slice();

          const numeric = Array.from(text.matchAll(/\b\d{1,3}(?:[.,]\d+)?\b/g))
            .map((item) => parseFloat(item[0].replace(',', '.')))
            .filter((n) => Number.isFinite(n));

          for (let i = 0; i < Math.min(3, numeric.length); i += 1) {
            values[i] = Math.max(0, Math.min(100, numeric[i]));
          }

          return [
            { label: 'PERF SCORE', value: values[0].toFixed(1), trend: values[0] >= 55 ? 4.2 : -3.7 },
            { label: 'RECHERCHE', value: values[1].toFixed(1), trend: values[1] >= 50 ? 2.8 : -4.1 },
            { label: 'RISQUE', value: values[2].toFixed(1), trend: values[2] <= 50 ? -2.9 : 1.9 }
          ];
        }

        function buildProgress(stats) {
          const toNumber = (value) => Math.max(0, Math.min(100, parseFloat(value)));
          const perf = toNumber(stats[0].value);
          const research = toNumber(stats[1].value);
          const risk = toNumber(stats[2].value);
          return [
            { label: 'Enseignement', value: perf },
            { label: 'Recherche', value: research },
            { label: 'Encadrement', value: Math.max(0, Math.min(100, 100 - Math.abs(50 - risk) * 1.4)) }
          ];
        }

        function autoResizeComposer() {
          composer.style.height = 'auto';
          composer.style.height = Math.min(composer.scrollHeight, 130) + 'px';
        }

        function exportConversation() {
          const lines = messages.map((msg) => '[' + msg.role.toUpperCase() + '] ' + msg.content).join('\n\n');
          const blob = new Blob([lines], { type: 'text/plain;charset=utf-8' });
          const anchor = document.createElement('a');
          anchor.href = URL.createObjectURL(blob);
          anchor.download = 'perfia-conversation.txt';
          anchor.click();
          URL.revokeObjectURL(anchor.href);
        }

        function configureAnthropicKey() {
          const current = localStorage.getItem('ANTHROPIC_API_KEY') || '';
          const next = window.prompt('Entrez votre clé API Anthropic (stockage local navigateur):', current);
          if (next === null) {
            return;
          }
          const clean = next.trim();
          if (!clean) {
            localStorage.removeItem('ANTHROPIC_API_KEY');
            toast('Clé API supprimée.');
            return;
          }
          localStorage.setItem('ANTHROPIC_API_KEY', clean);
          toast('Clé API enregistrée.');
        }

        function getAnthropicKey() {
          return (window.ANTHROPIC_API_KEY || localStorage.getItem('ANTHROPIC_API_KEY') || '').trim();
        }

        function roleInitials(role) {
          const map = {
            ENSEIGNANT: 'EN',
            CHEF_DEPARTEMENT: 'CD',
            ADMINISTRATION: 'AD',
            SUPER_ADMIN: 'SA'
          };
          return map[role] || 'ME';
        }

        function persistMessages() {
          localStorage.setItem('PERFIA_MESSAGES', JSON.stringify(messages.slice(-40)));
        }

        function restoreMessages() {
          try {
            const raw = localStorage.getItem('PERFIA_MESSAGES');
            if (!raw) {
              return null;
            }
            const parsed = JSON.parse(raw);
            if (!Array.isArray(parsed)) {
              return null;
            }
            return parsed.filter((item) => item && (item.role === 'assistant' || item.role === 'user') && typeof item.content === 'string');
          } catch (error) {
            return null;
          }
        }

        function toast(message) {
          pushMessage('assistant', 'Résumé: Notification.\nAnalyse: ' + message + '\nRecommandations: Continuez votre session PerfIA.');
        }

        function formatInline(value) {
          return escapeHtml(value).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        }

        function stripAccents(value) {
          return value.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        }

        function escapeHtml(value) {
          return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        }

        function escapeAttribute(value) {
          return String(value).replace(/"/g, '&quot;');
        }
      })();
    </script>
  </body>
</html>
