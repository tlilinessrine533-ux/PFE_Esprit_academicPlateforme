version: '3.8'

# ================================================================
#  ACADEMIC PLATFORM — INFRASTRUCTURE DEVOPS COMPLÈTE
# ================================================================
#  Ce fichier doit être placé à la RACINE du projet GitHub,
#  à côté des dossiers frontend/ et backend/
#
#  Structure attendue :
#    projet/
#    ├── frontend/          ← Code Angular du développeur
#    ├── backend/           ← Code Spring Boot du développeur
#    ├── docker/            ← Dockerfiles (fournis par DevOps)
#    ├── monitoring/        ← Configs Prometheus & Grafana
#    ├── docker-compose.yml ← CE FICHIER
#    └── ...
# ================================================================

services:

  # ============================================================
  #                    APPLICATION
  # ============================================================

  mysql:
    image: mysql:8
    container_name: academic_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pfe_academic_platform
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    image: academic-platform-backend:latest
    container_name: academic_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/pfe_academic_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - APP_JWT_SECRET=dev-only-jwt-secret-change-me-in-production
      - APP_MAIL_FROM=no-reply@esprit.tn
      - APP_WORKFLOW_MAIL_RH_RECIPIENT=rh@esprit.tn
      - APP_WORKFLOW_MAIL_SCOLARITE_RECIPIENT=scolarite@esprit.tn
      - SPRING_MAIL_HOST=mailhog
      - SPRING_MAIL_PORT=1025
      # Activer les métriques Prometheus via Spring Actuator
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,prometheus,metrics
      - MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED=true
    ports:
      - "8081:8081"
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    image: academic-platform-frontend:latest
    container_name: academic_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - app-network

  mailhog:
    image: mailhog/mailhog
    container_name: academic_mailhog
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app-network

  # ============================================================
  #                    CI/CD — JENKINS
  # ============================================================

  jenkins:
    build:
      context: .
      dockerfile: docker/jenkins/Dockerfile
    image: academic-platform-jenkins:latest
    container_name: academic_jenkins
    restart: always
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network

  # ============================================================
  #                    QUALITÉ DE CODE — SONARQUBE
  # ============================================================

  sonarqube:
    image: sonarqube:lts-community
    container_name: academic_sonarqube
    restart: always
    depends_on:
      - sonar-db
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonar-db:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - app-network

  sonar-db:
    image: postgres:15-alpine
    container_name: academic_sonar_db
    restart: always
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonarqube
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - app-network

  # ============================================================
  #                    MONITORING — PROMETHEUS & GRAFANA
  # ============================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: academic_prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: academic_grafana
    restart: always
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - app-network

  # ============================================================
  #                    REGISTRE D'ARTEFACTS — NEXUS
  # ============================================================

  nexus:
    image: sonatype/nexus3:latest
    container_name: academic_nexus
    restart: always
    ports:
      - "8082:8081"
    volumes:
      - nexus_data:/nexus-data
    networks:
      - app-network

# ============================================================
#                    VOLUMES & RÉSEAUX
# ============================================================

volumes:
  mysql_data:
  jenkins_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonar_db_data:
  prometheus_data:
  grafana_data:
  nexus_data:

networks:
  app-network:
    driver: bridge
